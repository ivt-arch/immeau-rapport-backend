# Fichier de déploiement pour Render.com (hébergement gratuit)
services:
  - type: web
    name: immeau-rapport-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn generate_rapport:app
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false   # à renseigner dans le dashboard Render
      - key: SMTP_PASS
        sync: false   # à renseigner dans le dashboard Render
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TO
        value: ivt@immeau.fr
